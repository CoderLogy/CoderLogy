name: Update Current Project

on:
  schedule:
    - cron: "0 */12 * * *"   # every 12 hours
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Get latest public push repository
        run: |
          LATEST_REPO=$(curl -s \
            "https://api.github.com/users/${{ github.repository_owner }}/events/public" \
            | jq -r '.[] | select(.type=="PushEvent") | .repo.name' \
            | head -n 1)
          echo "LATEST_REPO=$LATEST_REPO" >> $GITHUB_ENV
          echo "Latest repo detected: $LATEST_REPO"

      - name: Update README
        run: |
          # Only targets the specific "currently working on" line, nothing else
          sed -i "s|🔭 I'm currently working on \*\*[^*]*\*\*|🔭 I'm currently working on **${LATEST_REPO}**|" README.md

      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "chore: update current project to ${LATEST_REPO}"
          git push
